<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout/base :: layout(~{::content}, 'Транзакції')}">
<body>
<div th:fragment="content">
    <div class="page-header">
        <h1>Транзакції</h1>
    </div>

    <!-- Filters -->
    <div class="card filter-card">
        <div class="card-body">
            <form class="filter-form" hx-get="/admin/transactions/_table" hx-target="#transactions-table" hx-push-url="true">
                <div class="filter-row">
                    <div class="filter-group">
                        <label for="dateFrom">Від</label>
                        <input type="date" id="dateFrom" name="dateFrom" th:value="${dateFrom}">
                    </div>
                    <div class="filter-group">
                        <label for="dateTo">До</label>
                        <input type="date" id="dateTo" name="dateTo" th:value="${dateTo}">
                    </div>
                    <div class="filter-group">
                        <label for="clientId">Client ID (Poster)</label>
                        <input type="number" id="clientId" name="clientId" th:value="${clientId}" placeholder="Опційно">
                    </div>
                    <button type="submit" class="btn btn-primary">Фільтрувати</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Transactions Table -->
    <div class="card">
        <div class="card-body">
            <div id="transactions-table">
                <div th:replace="~{admin/transactions/_table :: table}"></div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
