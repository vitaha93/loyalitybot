<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout/base :: layout(~{::content}, 'Управління бонусами')}">
<body>
<div th:fragment="content">
    <div class="page-header">
        <h1>Управління бонусами</h1>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="card">
        <div class="card-header">
            <h2>Нарахувати/списати бонуси</h2>
        </div>
        <div class="card-body">
            <p>Для управління бонусами перейдіть на сторінку клієнта та скористайтесь відповідними функціями.</p>
            <p>
                <a th:href="@{/admin/customers}" class="btn btn-primary">Перейти до списку клієнтів</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
