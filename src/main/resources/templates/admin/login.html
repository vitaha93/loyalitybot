<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Loyalty Admin</title>
    <link rel="stylesheet" th:href="@{/admin/css/admin.css}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Loyalty Bot</h1>
                <p>Admin Panel</p>
            </div>

            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <div class="login-body">
                <p>Увійдіть через Telegram для доступу до адмін-панелі</p>

                <div class="telegram-login-wrapper">
                    <script async src="https://telegram.org/js/telegram-widget.js?22"
                            th:attr="data-telegram-login=${botUsername}"
                            data-size="large"
                            data-radius="8"
                            th:data-auth-url="@{/admin/auth/callback}"
                            data-request-access="write">
                    </script>
                </div>

                <!-- Dev Login Button (only in local profile) -->
                <div th:if="${devMode}" class="dev-login-section">
                    <hr style="margin: 1.5rem 0; border-color: #e5e7eb;">
                    <p style="color: #f59e0b; font-size: 0.875rem; margin-bottom: 1rem;">
                        Dev Mode: Telegram Login може не працювати на localhost
                    </p>
                    <a th:href="@{/admin/dev-login}" class="btn btn-dev">
                        Dev Login (Local Only)
                    </a>
                </div>

                <p class="login-hint">
                    Тільки адміністратори мають доступ до цієї панелі.
                    <br>Зверніться до власника бота для отримання доступу.
                </p>
            </div>
        </div>
    </div>
</body>
</html>
